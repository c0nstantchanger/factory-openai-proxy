services:
  factory-proxy:
    build: .
    container_name: factory-openai-proxy
    restart: unless-stopped
    ports:
      - "${PORT:-4011}:4011"
    environment:
      - FACTORY_API_KEY=${FACTORY_API_KEY}
      - DROID_REFRESH_KEY=${DROID_REFRESH_KEY:-}
    volumes:
      - ./config.json:/app/config.json:ro
